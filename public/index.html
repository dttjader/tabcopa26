<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4A017;--gold2:#F5C842;
  --dark:#0A0C10;--card:#111318;--border:#1E2230;
  --text:#E8EAF0;--muted:#6B7280;
  --green:#22C55E;--red:#EF4444;--yellow:#EAB308;
  --pen:#A78BFA;--blue:#60A5FA;
  --slot-bg:rgba(212,160,23,.08);--slot-border:rgba(212,160,23,.25);--slot-color:#D4A017;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(212,160,23,.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 100%,rgba(59,130,246,.06) 0%,transparent 60%)}
header{text-align:center;padding:1.8rem 1rem 1rem;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(212,160,23,.05) 0%,transparent 100%)}
header .eyebrow{font-size:.65rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:.35rem}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.8rem);letter-spacing:.05em;
  background:linear-gradient(135deg,#F5C842 0%,#D4A017 50%,#F5C842 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
header p{color:var(--muted);font-size:.8rem;margin-top:.35rem}
nav.tabs{display:flex;justify-content:center;gap:.35rem;padding:1rem 1rem 0;flex-wrap:wrap}
.tab-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.4rem 1rem;
  border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--gold);color:var(--gold)}
.tab-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.container{max-width:1200px;margin:0 auto;padding:1.5rem 1rem 3rem}
.view{display:none}.view.active{display:block}
.readonly-note{display:inline-flex;align-items:center;gap:.4rem;font-size:.71rem;color:var(--muted);
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:.28rem .65rem;margin-bottom:1rem}
.phase-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.1rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}
.phase-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.35rem .9rem;
  border-radius:8px;font-size:.76rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;font-weight:500}
.phase-btn:hover{border-color:var(--gold);color:var(--gold)}
.phase-btn.on{background:rgba(212,160,23,.12);border-color:var(--gold);color:var(--gold2);font-weight:700}
.filter-bar{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.8rem}
.filter-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
  padding:.25rem .7rem;border-radius:999px;font-size:.7rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.filter-btn:hover,.filter-btn.on{border-color:var(--gold);color:var(--gold)}
.match-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.08em;color:var(--gold);
  margin:.9rem 0 .55rem;padding-bottom:.28rem;border-bottom:1px solid var(--border)}
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:.65rem}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem}
.match-card.done{border-color:rgba(34,197,94,.3)}
.match-info{font-size:.59rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.55rem;
  display:flex;justify-content:space-between;align-items:center}
.match-phase-badge{font-size:.56rem;padding:2px 6px;border-radius:999px;font-weight:700;letter-spacing:.03em}
.badge-grupo{background:rgba(34,197,94,.12);color:var(--green)}
.badge-rep{background:rgba(167,139,250,.12);color:var(--pen)}
.badge-ko{background:rgba(212,160,23,.12);color:var(--gold)}
.view-toggle{display:flex;gap:.3rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:3px;margin-left:auto}
.view-toggle-btn{padding:.28rem .7rem;border-radius:5px;font-size:.7rem;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);background:transparent;transition:all .15s}
.view-toggle-btn.on{background:var(--card);color:var(--gold);border:1px solid var(--border)}
.cal-day{margin-bottom:.45rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card)}
.cal-day.expanded{border-color:rgba(212,160,23,.25)}
.cal-day.today-day{border-color:rgba(212,160,23,.4)}
.cal-day-header{display:flex;align-items:center;gap:.7rem;padding:.6rem .85rem;cursor:pointer;user-select:none;transition:background .15s}
.cal-day-header:hover{background:rgba(255,255,255,.03)}
.cal-date-badge{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.35rem .7rem;text-align:center;min-width:52px}
.cal-date-day{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold2);line-height:1}
.cal-date-month{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cal-date-label{font-size:.78rem;color:var(--text);font-weight:600}
.cal-date-sub{font-size:.65rem;color:var(--muted)}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.35rem}
.match-team{display:flex;align-items:center;gap:.3rem;font-size:.76rem;font-weight:600;flex-wrap:wrap;min-width:0}
.match-team.right{flex-direction:row-reverse;text-align:right;justify-content:flex-start}
.score-area{display:flex;flex-direction:column;align-items:center;gap:.28rem}
.score-row{display:flex;align-items:center;gap:.22rem}
.score-input{width:32px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;
  color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:1.28rem;text-align:center;
  padding:.08rem 0;outline:none;transition:border-color .2s}
.score-input:focus{border-color:var(--gold)}
.score-sep{color:var(--muted);font-size:.78rem}
.pen-row{display:none;align-items:center;gap:.28rem;padding:.3rem .45rem;
  background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.2);border-radius:5px}
.pen-row.visible{display:flex}
.pen-label{font-size:.58rem;color:var(--pen);font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pen-sep{color:rgba(167,139,250,.4);font-size:.7rem}
.score-input.pen{color:var(--pen);border-color:rgba(167,139,250,.3);font-size:1.05rem;width:28px}
.score-input.pen:focus{border-color:var(--pen)}
.card-actions{display:flex;gap:.3rem;margin-top:.6rem}
.btn-save{flex:1;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);color:var(--gold);
  border-radius:6px;padding:.28rem;font-size:.69rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-save:hover{background:rgba(212,160,23,.22)}
.btn-clear{background:transparent;border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:6px;
  padding:.28rem .55rem;font-size:.65rem;cursor:pointer;font-family:'DM Sans',sans-serif;opacity:.5}
.btn-clear:hover{opacity:1;background:rgba(239,68,68,.08)}
.team-edit-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);
  font-size:.76rem;font-weight:600;outline:none;width:100%;font-family:'DM Sans',sans-serif}
.team-edit-input.right{text-align:right}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:1rem}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.group-header{background:linear-gradient(135deg,rgba(212,160,23,.15),rgba(212,160,23,.05));
  padding:.6rem 1rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;
  color:var(--gold);border-bottom:1px solid var(--border)}
.group-table{width:100%;border-collapse:collapse}
.group-table th{padding:.35rem .5rem;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);text-align:center;font-weight:500}
.group-table th:first-child{text-align:left}
.group-table td{padding:.48rem .5rem;font-size:.78rem;text-align:center;border-top:1px solid rgba(255,255,255,.04)}
.group-table td:first-child{text-align:left}
.team-cell{display:flex;align-items:center;gap:.35rem;font-weight:500;font-size:.76rem}
.pts-cell{font-weight:700;color:var(--gold2)}
.qualify-1 td:first-child{border-left:3px solid var(--green)}
.qualify-2 td:first-child{border-left:3px solid #86efac}
.qualify-3 td:first-child{border-left:3px solid var(--yellow)}
.eliminate td:first-child{border-left:3px solid transparent}
.legend{display:flex;gap:.9rem;flex-wrap:wrap;margin-bottom:.9rem;font-size:.71rem;color:var(--muted)}
.legend-item{display:flex;align-items:center;gap:.35rem}
.legend-dot{width:9px;height:9px;border-radius:2px}
.rep-badge{display:inline-block;font-size:.5rem;background:rgba(212,160,23,.2);color:var(--gold);
  border-radius:3px;padding:1px 3px;vertical-align:middle;font-weight:700;margin-left:2px}
.bracket-outer{overflow-x:auto;padding:1rem 0}
.bracket{display:flex;gap:1rem;min-width:960px;align-items:stretch}
.bracket-round{flex:1;display:flex;flex-direction:column}
.round-title{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.1em;color:var(--muted);
  text-align:center;margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.bracket-matches{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:.45rem}
.bracket-match{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.bracket-team{display:flex;align-items:center;justify-content:space-between;padding:.38rem .5rem;font-size:.71rem;font-weight:500}
.bracket-team:first-child{border-bottom:1px solid var(--border)}
.bracket-team.winner{color:var(--gold2);font-weight:700;background:rgba(245,200,66,.06)}
/* Slot não definido — estilo especial */
.bracket-team.slot-pending{color:var(--slot-color);font-style:italic;opacity:.7}
.bracket-score-k{font-family:'Bebas Neue',sans-serif;font-size:.88rem;color:var(--gold);min-width:12px;text-align:right}
.bracket-pen{font-size:.62rem;color:var(--pen);margin-left:2px}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1rem}
.rep-card{background:var(--card);border:1px solid rgba(167,139,250,.25);border-radius:12px;overflow:hidden}
.rep-card-header{background:rgba(167,139,250,.07);padding:.55rem .9rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.rep-card-title{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.07em;color:var(--pen)}
.rep-group-badge{font-size:.62rem;color:var(--gold);background:rgba(212,160,23,.12);padding:2px 7px;border-radius:999px}
.rep-match-row{display:flex;align-items:center;gap:.45rem;padding:.42rem .85rem;border-bottom:1px solid rgba(255,255,255,.04)}
.rep-match-row:last-child{border-bottom:none}
.rep-stage{font-size:.58rem;color:var(--muted);font-weight:700;min-width:22px;letter-spacing:.03em}
.rep-team{flex:1;font-size:.74rem;font-weight:500}
.rep-team.right{text-align:right}
.rep-score{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--gold2);min-width:13px;text-align:center}
.rep-score.pen{color:var(--pen);font-size:.78rem}
.rep-winner-row{padding:.45rem .85rem;font-size:.73rem;color:var(--green);border-top:1px solid rgba(255,255,255,.06)}
.rep-pending{padding:.45rem .85rem;font-size:.71rem;color:var(--muted);font-style:italic}
.rep-note{padding:.3rem .85rem;font-size:.66rem;color:var(--muted);background:rgba(255,255,255,.02)}
/* Legenda de slots */
.slot-legend{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem;padding:.55rem .8rem;
  background:rgba(212,160,23,.05);border:1px solid rgba(212,160,23,.15);border-radius:8px;
  font-size:.67rem;color:var(--muted)}
.slot-legend strong{color:var(--gold);font-weight:700}
/* Slot badge inline no bracket */
.slot-badge{display:inline-flex;align-items:center;gap:.25rem;padding:.05rem .35rem;border-radius:4px;
  background:var(--slot-bg);border:1px solid var(--slot-border);color:var(--slot-color);
  font-size:.62rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;white-space:nowrap}
/* Painel de preview do chaveamento R32 */
.r32-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.5rem;margin-bottom:1.2rem}
.r32-preview-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;
  display:flex;align-items:center;gap:.5rem;font-size:.72rem}
.r32-preview-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);min-width:20px}
.r32-preview-teams{flex:1;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.r32-team-name{font-weight:600;color:var(--text)}
.r32-team-name.is-slot{color:var(--slot-color);font-style:italic;font-weight:500}
.r32-vs{color:var(--muted);font-size:.65rem}
.players-toolbar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;align-items:center}
.players-search{flex:1;min-width:160px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:.42rem .8rem;font-size:.8rem;font-family:'DM Sans',sans-serif;outline:none}
.players-search:focus{border-color:var(--gold)}
.players-filter-sel{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);
  padding:.42rem .7rem;font-size:.76rem;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.players-filter-sel:focus{border-color:var(--gold)}
.btn-add-player{background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.35);color:var(--gold);
  border-radius:8px;padding:.42rem 1rem;font-size:.76rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-add-player:hover{background:rgba(212,160,23,.22)}
.players-table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
.players-table{width:100%;border-collapse:collapse;min-width:1050px}
.players-table th{padding:.45rem .6rem;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.players-table th:hover{color:var(--gold)}
.players-table th.sorted{color:var(--gold2)}
.players-table th:first-child,.players-table th:nth-child(2),.players-table th:nth-child(3){text-align:left}
.players-table td{padding:.48rem .6rem;font-size:.78rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.players-table td:first-child,.players-table td:nth-child(2),.players-table td:nth-child(3){text-align:left}
.players-table tr:hover td{background:rgba(255,255,255,.025)}
.p-input{width:100%;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.78rem;outline:none;padding:0}
.p-input.num{text-align:center;width:40px;color:var(--gold2)}
.p-input.num.yellow-stat{color:var(--yellow)}
.p-input.num.red-stat{color:var(--red)}
.p-input.num.assist-stat{color:var(--blue)}
.p-input.num.def-stat{color:#34d399}
.p-input.num.pen-stat{color:var(--pen)}
.pos-badge{display:inline-block;font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.pos-G{background:rgba(34,197,94,.15);color:var(--green)}
.pos-D{background:rgba(96,165,250,.15);color:var(--blue)}
.pos-M{background:rgba(212,160,23,.15);color:var(--gold)}
.pos-A{background:rgba(239,68,68,.15);color:var(--red)}
.btn-del-player{background:transparent;border:none;color:var(--red);cursor:pointer;font-size:.9rem;opacity:.4;padding:0 .2rem}
.btn-del-player:hover{opacity:1}
.sort-arrow{font-size:.55rem;margin-left:2px;opacity:.5}
.sort-arrow.active{opacity:1;color:var(--gold2)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.9rem;margin-bottom:1.5rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.stat-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.28rem}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold2)}
.stat-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.stats-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;
  color:var(--text);margin-bottom:.7rem;margin-top:1.4rem}
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{padding:.4rem .65rem;font-size:.59rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  text-align:left;border-bottom:1px solid var(--border)}
.rank-table td{padding:.5rem .65rem;font-size:.79rem;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;
  border-radius:50%;font-size:.6rem;font-weight:700}
.rank-1{background:var(--gold);color:#000}.rank-2{background:#9CA3AF;color:#000}
.rank-3{background:#B45309;color:#fff}.rank-n{background:var(--border);color:var(--muted)}
.stats-cols{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:700px){.stats-cols{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:var(--gold);margin-bottom:1rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.modal-grid.full{grid-template-columns:1fr}
.modal-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.22rem}
.modal-input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:.4rem .65rem;font-size:.8rem;font-family:'DM Sans',sans-serif;outline:none}
.modal-input:focus{border-color:var(--gold)}
.modal-select{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:.4rem .65rem;font-size:.8rem;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.modal-select option{background:#1a1d24}
.modal-btns{display:flex;gap:.45rem;margin-top:1rem}
.modal-btn{flex:1;padding:.48rem;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none}
.modal-btn.save{background:var(--gold);color:#000}
.modal-btn.cancel{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.modal-section-title{font-size:.65rem;color:var(--pen);text-transform:uppercase;letter-spacing:.08em;font-weight:700;
  margin:.6rem 0 .3rem;padding-top:.5rem;border-top:1px solid var(--border)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--green);color:#000;padding:.5rem 1.2rem;border-radius:999px;
  font-size:.77rem;font-weight:600;transition:transform .3s;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.groups-grid,.rep-grid{grid-template-columns:1fr}.bracket{min-width:700px}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">⚽ Edição Especial</div>
  <h1>Copa do Mundo 2026</h1>
  <p>EUA · Canadá · México &nbsp;|&nbsp; 11 Jun – 19 Jul 2026</p>
</header>
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab(this,'partidas')">📋 Partidas</button>
  <button class="tab-btn" onclick="switchTab(this,'grupos')">🏆 Grupos</button>
  <button class="tab-btn" onclick="switchTab(this,'matamata')">⚔️ Mata-Mata</button>
  <button class="tab-btn" onclick="switchTab(this,'stats')">📊 Estatísticas</button>

// 3. Geração das 495 Opções (Ordem de Prioridade Oficial FIFA)
const COMBINACOES_FIFA = (function() {
    const grupos = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    const chavesPrio = [
        { match: 'E1', grupos: ['A', 'B', 'C', 'D', 'F'] },
        { match: 'I1', grupos: ['C', 'D', 'F', 'G', 'H'] },
        { match: 'D1', grupos: ['B', 'E', 'F', 'I', 'J'] },

        { match: 'A1', grupos: ['C', 'E', 'F', 'H', 'I'] },
        { match: 'B1', grupos: ['E', 'F', 'G', 'I', 'J'] },
        { match: 'K1', grupos: ['D', 'E', 'I', 'J', 'L'] },
        { match: 'L1', grupos: ['E', 'H', 'I', 'J', 'K'] }
    ];
    function getCombos(arr, k) {
        let res = [];
        function helper(start, current) {
            if (current.length === k) { res.push([...current]); return; }
            for (let i = start; i < arr.length; i++) helper(i + 1, [...current, arr[i]]);
        }
        helper(0, []); return res;
    }
    return getCombos(grupos, 8).map(combo => {
        const mapping = {}; const usados = new Set();
        chavesPrio.forEach(prio => {
            const found = prio.grupos.find(g => combo.includes(g) && !usados.has(g)) || combo.find(g => !usados.has(g));
            mapping[prio.match] = found; usados.add(found);
        });
        return { classificados: combo, mapping };
    });
})();

// 1. A MESTRA (A função que a interface chama)
function displaySlot(code) {
  const slotId = code === '3-1' ? 'KO_R32_1' : code;

  // 1. Busca no CSV se o mandante já foi decidido
  if (Array.isArray(csvData)) {
    const row = csvData.find(r => String(r.id) === slotId);
    if (row && (row.home || row.mandante)) {
      return String(row.home || row.mandante);
    }
  }

  // 2. Calcula as probabilidades dos 3º colocados
  if (typeof getPossibleScenarios === 'function' && typeof calcStandings === 'function') {
    try {
      const scenarios = getPossibleScenarios();
      const rankMatch = String(code).match(/^3-(\d+)$/);
      const rank = rankMatch ? parseInt(rankMatch[1], 10) : 1;
      const counts = new Map();

      if (Array.isArray(ALLOWED_THIRD_PLACE_GROUPS)) {
        for (const scenario of scenarios) {
          const standings = calcStandings(scenario);
          const thirds = [];

          for (const groupId of ALLOWED_THIRD_PLACE_GROUPS) {
            const group = standings[groupId];
            if (Array.isArray(group) && group[2]) {
              thirds.push(group[2]);
            }
          }

          thirds.sort((a, b) => {
            const ap = a.points || 0;
            const bp = b.points || 0;
            if (bp !== ap) return bp - ap;

            const agd = a.goalDifference || 0;
            const bgd = b.goalDifference || 0;
            if (bgd !== agd) return bgd - agd;

            const agf = a.goalsFor || 0;
            const bgf = b.goalsFor || 0;
            if (bgf !== agf) return bgf - agf;

            return String(a.name).localeCompare(String(b.name));
          });

          if (thirds.length >= rank) {
            const team = thirds[rank - 1];
            counts.set(team.name, (counts.get(team.name) || 0) + 1);
          }
        }
      }

      if (counts.size > 0) {
        const total = scenarios.length || 1;
        let bestTeam = null;
        let bestProb = -1;

        for (const [team, count] of counts) {
          const prob = count / total;
          if (prob > bestProb) {
            bestProb = prob;
            bestTeam = team;
          }
        }

        if (bestTeam) return bestTeam;
      }
    } catch (e) {
      // fallback silencioso para o código original
    }
  }

  // 3. Se nada funcionar, retorna o código original
  return code;
}
  
// 2. O FILTRO (Auxiliar da Mestra)
function resolveSlotToName(code) {
    if (!code || code === '?') return null;
    
    var gm = code.match(/^([A-L])([12])$/);
    if (gm) {
        var st = calcStandings(gm[1]);
        var pos = parseInt(gm[2]) - 1;
        
        // ✅ CORRIGIDO: Retorna o nome se existir, independente de hasGames
        if (st && st[pos] && st[pos].name) {
            return st[pos].name;
        }
        
        // Se não conseguir calcular standings, retorna null para usar fallback
        return null;
    }
    return null; 
}

// 3. O MOTOR (Cálculo dos Cenários)
function getPossibleScenarios() {
    var qualificados = []; 
    var eliminados = [];

    if (typeof COMBINACOES_FIFA === 'undefined') {
        console.error("MOTOR: COMBINACOES_FIFA não encontrada!");
        return [];
    }

    return COMBINACOES_FIFA.filter(function(c) {
        for (var i = 0; i < qualificados.length; i++) {
            if (c.classificados.indexOf(qualificados[i]) === -1) return false;
        }
        for (var j = 0; j < eliminados.length; j++) {
            if (c.classificados.indexOf(eliminados[j]) !== -1) return false;
        }
        return true;
    });
}

function calcPontuacao(j){
  const ptDefesas   = (j.posicao==='G') ? (j.defesas||0)*1 : 0;
  const ptPenaltis  = (j.posicao==='G')
    ? Math.max(0, j.penaltis||0) * 100
    : Math.min(0, j.penaltis||0) * 10;
  return (j.gols||0)*100
       + (j.assistencias||0)*10
       + (j.vermelhos||0)*(-10)
       + (j.amarelos||0)*(-1)
       + (j.golsContra||0)*(-100)
       + ptDefesas
       + ptPenaltis;
}

          }

    if(s.knockout){
      Object.keys(s.knockout).forEach(k=>{
        if(Array.isArray(s.knockout[k])&&Array.isArray(state.knockout[k])){

          });
        }
      });

    KO_R32_SLOTS.forEach((slot, i) => {

      if(m && (m.away === '?' || !m.away) && slot.away !== '?') m.away = slot.away;
    });
    if(s.jogadores) state.jogadores=s.jogadores;
    if(s._nextId)   state._nextId=s._nextId;
  }catch(e){}
})();

function getWinner(m){
  if(m.hs===null||m.as===null)return null;
  if(m.hs>m.as)return m.home;
  if(m.as>m.hs)return m.away;
  if(m.hpen!==null&&m.apen!==null){
    if(m.hpen>m.apen)return m.home;
    if(m.apen>m.hpen)return m.away;
  }
  return null;
}
function getRepFinalTeams(rep){
  const fin=rep.partidas.find(p=>p.stage==='FIN');
  if(rep.tipo==='europeia'){
    const sfs=rep.partidas.filter(p=>p.stage==='SF');
    const w0=getRepWinner(rep,sfs[0]),w1=getRepWinner(rep,sfs[1]);
    return{home:w0||fin.home||'?',away:w1||fin.away||'?'};
  }
  const sf=rep.partidas.find(p=>p.stage==='SF');
  return{home:fin.home||'?',away:getRepWinner(rep,sf)||'?'};
}
function getRepWinner(rep,p){
  const sc=state.repScores[rep.id]?.[p.id];
  if(!sc)return null;
  return getWinner({home:p.home,away:p.away,...sc});
}
function getRepFinalWinner(rep){
  const fin=rep.partidas.find(p=>p.stage==='FIN');
  const sc=state.repScores[rep.id]?.[fin.id];
  if(!sc)return null;
  const t=getRepFinalTeams(rep);
  return getWinner({...t,...sc});
}
function resolveTeam(name,g){
  if(!isRepSlot(name))return name;
  const rep=repDef.find(r=>r.groupLetter===g);
  if(!rep)return name;
  return getRepFinalWinner(rep)||name;
}
function getGroupTeams(g){return groupsBase[g].map(t=>resolveTeam(t,g))}
function syncAllRepToGroups(){
  repDef.forEach(rep=>{
    const winner=getRepFinalWinner(rep);
    if(!winner)return;
    state.groupMatches[rep.groupLetter].forEach(m=>{
      if(isRepSlot(m.home))m.home=winner;
      if(isRepSlot(m.away))m.away=winner;
    });
  });
}

function calcGlobalStats(){
  let goals=0,matches=0,played=0;
  Object.keys(state.groupMatches).forEach(g=>state.groupMatches[g].forEach(m=>{
    matches++;
    if(m.hs!==null&&m.as!==null){played++;goals+=m.hs+m.as;}
  }));
  koRounds.forEach(r=>state.knockout[r.key].forEach(m=>{
    matches++;
    if(m.hs!==null&&m.as!==null){
      played++;goals+=m.hs+m.as;
      if(m.hpen!==null&&m.apen!==null)goals+=m.hpen+m.apen;
    }
  }));
  return{goals,matches,played};
}

          <input class="score-input s-a" type="number" min="0" max="30" value="${as!==null?as:''}" placeholder="–">
        </div>
        ${allowPen?`<div class="pen-row${isDraw?' visible':''}">
          <span class="pen-label">🥅 Pên.</span>
          <input class="score-input pen p-h" type="number" min="0" value="${hpen!==null?hpen:''}" placeholder="–">
          <span class="pen-sep">×</span>
          <input class="score-input pen p-a" type="number" min="0" value="${apen!==null?apen:''}" placeholder="–">
        </div>`:''}
      </div>
      <div class="match-team right">${awayField}</div>
    </div>
    <div class="card-actions">
      <button class="btn-save">💾 Salvar</button>
      ${done?`<button class="btn-clear">✕</button>`:''}
    </div>`;
  const sH=card.querySelector('.s-h'),sA=card.querySelector('.s-a');
  const pH=card.querySelector('.p-h'),pA=card.querySelector('.p-a');
  const penRow=card.querySelector('.pen-row');
  if(allowPen&&penRow){
    function checkDraw(){
      const draw=sH.value!==''&&sA.value!==''&&parseInt(sH.value)===parseInt(sA.value);
      penRow.classList.toggle('visible',draw);
      if(!draw){if(pH)pH.value='';if(pA)pA.value='';}
    }
    sH.addEventListener('input',checkDraw);sA.addEventListener('input',checkDraw);
  }
  card.querySelector('.btn-save').onclick=()=>{
    const hsV=sH.value!==''?parseInt(sH.value):null;
    const asV=sA.value!==''?parseInt(sA.value):null;
    const draw=hsV!==null&&asV!==null&&hsV===asV;
    const hpenV=allowPen&&draw&&pH&&pH.value!==''?parseInt(pH.value):null;
    const apenV=allowPen&&draw&&pA&&pA.value!==''?parseInt(pA.value):null;
    const homeV=editTeams?(card.querySelector('.t-home')?.value||null):null;
    const awayV=editTeams?(card.querySelector('.t-away')?.value||null):null;
    onSave(hsV,asV,hpenV,apenV,homeV,awayV);
  };
  const cl=card.querySelector('.btn-clear');
  if(cl)cl.onclick=onClear;
  return card;
}

function makeInfoCard(item){
  const done=item.hs!==null&&item.as!==null;
  const isDraw=done&&item.hs===item.as;
  const card=document.createElement('div');
  card.className='match-card'+(done?' done':'');
  let scoreHtml;
  if(done){
    const penHtml=isDraw&&item.hpen!==null
      ?`<div style="font-size:.65rem;color:var(--pen);text-align:center;margin-top:.1rem">(${item.hpen} × ${item.apen} pên.)</div>`
      :'';
    scoreHtml=`
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold2);text-align:center;letter-spacing:.05em;line-height:1">
        ${item.hs} × ${item.as}
      </div>${penHtml}`;
  }else{
    scoreHtml=`
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);text-align:center">
        ${item.time||'A definir'}
      </div>`;
  }
  card.innerHTML=`
    <div class="match-info">
      <span>${item.label}</span>
      <span class="match-phase-badge ${item.badge}">${item.fase.toUpperCase()}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.4rem;margin:.4rem 0">
      <div style="font-size:.78rem;font-weight:600;word-break:break-word">${item.home}</div>
      <div>${scoreHtml}</div>
      <div style="font-size:.78rem;font-weight:600;text-align:right;word-break:break-word">${item.away}</div>
    </div>
    ${item.estadio||item.city?`
    <div style="font-size:.62rem;color:var(--muted);text-align:center;border-top:1px solid var(--border);padding-top:.3rem;margin-top:.3rem">
      ${[item.estadio,item.city].filter(Boolean).join(' · ')}
    </div>`:''}`;
  return card;
}

let schedule=[];
let scheduleLoaded=false;

async function loadSchedule(){
  if(scheduleLoaded)return;
  try{
    const r=await fetch('resultados.csv');
    if(!r.ok)throw new Error('CSV não encontrado');
    const text=await r.text();
    const lines=text.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.replace(/\r/g,'').trim());
    schedule=lines.slice(1).map(line=>{
      const cols=[];let cur='',inQ=false;
      for(let ch of line){
        if(ch==='"')inQ=!inQ;
        else if(ch===','&&!inQ){cols.push(cur);cur='';}
        else cur+=ch;
      }
      cols.push(cur);
      const obj={};
      headers.forEach((h,i)=>{obj[h.trim()]=(cols[i]||'').replace(/\r/g,'').trim();});
      obj.gols_mandante =obj.gols_mandante !==''?parseInt(obj.gols_mandante) :null;
      obj.gols_visitante=obj.gols_visitante!==''?parseInt(obj.gols_visitante):null;
      obj.pen_mandante  =obj.pen_mandante  !==''?parseInt(obj.pen_mandante)  :null;
      obj.pen_visitante =obj.pen_visitante !==''?parseInt(obj.pen_visitante) :null;
      return obj;
    }).filter(o=>o.id);
    scheduleLoaded=true;
    applyScheduleToState();
  }catch(e){
    console.warn('Não foi possível carregar resultados.csv:',e.message);
    scheduleLoaded=true;
  }
}

function applyScheduleToState(){
  schedule.forEach(row=>{
    if(row.fase==='grupos'){
      const g=row.grupo;
      if(!state.groupMatches[g])return;
      const idNum=parseInt(row.id.split('_').pop())-1;
      const m=state.groupMatches[g][idNum];
      if(!m)return;
      m.home=row.mandante;m.away=row.visitante;
      if(row.gols_mandante!==null){m.hs=row.gols_mandante;m.as=row.gols_visitante;}
    }
    if(row.fase==='repescagem'){
      const repId=row.grupo;
      if(!state.repScores[repId])state.repScores[repId]={};
      const rep=repDef.find(r=>r.id===repId);
      if(!rep)return;
      const p=rep.partidas.find(p=>p.stage===row.etapa);
      if(p&&row.gols_mandante!==null){
        state.repScores[repId][p.id]={hs:row.gols_mandante,as:row.gols_visitante,hpen:row.pen_mandante,apen:row.pen_visitante};
      }
    }
    if(row.fase==='matamata'){
      const roundKey=row.grupo;
      if(!state.knockout[roundKey])return;
      const idx=parseInt(row.id.split('_').pop())-1;
      if(isNaN(idx)||idx<0)return;
      const m=state.knockout[roundKey][idx];
      if(!m)return;
      // Para R32: NÃO sobrescrever os códigos de slot com "?"
      if(roundKey === 'r32') {
        // Só salvar resultado, não os times (gerenciados pelos slots)
        if(row.gols_mandante!==null){
          m.hs=row.gols_mandante;m.as=row.gols_visitante;
          m.hpen=row.pen_mandante;m.apen=row.pen_visitante;
        }
      } else {
        if(row.mandante&&row.mandante!=='?')m.home=row.mandante;
        if(row.visitante&&row.visitante!=='?')m.away=row.visitante;
        if(row.gols_mandante!==null){m.hs=row.gols_mandante;m.as=row.gols_visitante;m.hpen=row.pen_mandante;m.apen=row.pen_visitante;}
      }
    }
  });
  syncAllRepToGroups();saveState();
}

function buildCalendarItems(){
  return schedule
    .filter(row=>row.data)
    .map(row=>({
      id:row.id,date:row.data,time:row.hora_brasilia||'',
      city:row.cidade||'',estadio:row.estadio||'',
      home:row.mandante||'?',away:row.visitante||'?',
      hs:row.gols_mandante,as:row.gols_visitante,
      hpen:row.pen_mandante,apen:row.pen_visitante,
      fase:row.fase,
      badge:({grupos:'badge-grupo',repescagem:'badge-rep',matamata:'badge-ko'})[row.fase]||'badge-grupo',
      label:({grupos:'Grupo '+row.grupo,repescagem:row.grupo,matamata:row.etapa})[row.fase]||row.fase,
    }))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
}

function formatDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return{day:d.getDate(),month:months[d.getMonth()],year:d.getFullYear(),weekday:days[d.getDay()]};
}

function toggleCalDay(dateStr){
  const dayDiv=document.getElementById('calday_'+dateStr.replace(/-/g,'_'));
  if(!dayDiv)return;
  const grid=dayDiv.querySelector('.cal-matches');
  const arrow=dayDiv.querySelector('.cal-arrow');
  const expanded=dayDiv.classList.toggle('expanded');
  grid.style.display=expanded?'grid':'none';
  if(arrow)arrow.textContent=expanded?'▲':'▼';
}

function renderMatchesCalendario(){
  const body=document.getElementById('matches-body');
  const items=buildCalendarItems();
  if(items.length===0){
    body.innerHTML='<div style="color:var(--muted);padding:2rem;text-align:center">Nenhum jogo encontrado no calendário.</div>';
    return;
  }
  const byDate={};
  items.forEach(item=>{if(!byDate[item.date])byDate[item.date]=[];byDate[item.date].push(item);});
  body.innerHTML='';
  const today=new Date().toISOString().slice(0,10);
  Object.keys(byDate).sort().forEach(dateStr=>{
    const fd=formatDate(dateStr);
    const dayItems=byDate[dateStr];
    const isToday=dateStr===today;
    const isPast=dateStr<today;
    const startExpanded=isToday;
    const doneCount=dayItems.filter(i=>i.hs!==null).length;
    const doneLabel=doneCount>0?` · <span style="color:var(--green);font-size:.65rem">${doneCount} encerrada${doneCount>1?'s':''}</span>`:'';
    const todayLabel=isToday?' <span style="color:var(--gold);font-size:.62rem;font-weight:700">(hoje)</span>':'';
    const dayDiv=document.createElement('div');
    dayDiv.className='cal-day'+(isToday?' today-day':'')+(startExpanded?' expanded':'');
    dayDiv.id='calday_'+dateStr.replace(/-/g,'_');
    dayDiv.innerHTML=`
      <div class="cal-day-header" onclick="toggleCalDay('${dateStr}')">
        <div class="cal-date-badge" style="${isToday?'border-color:var(--gold);background:rgba(212,160,23,.1)':isPast?'opacity:.6':''}">
          <div class="cal-date-day" style="${isToday?'color:var(--gold)':isPast?'color:var(--muted)':''}">${fd.day}</div>
          <div class="cal-date-month">${fd.month} ${fd.year}</div>
        </div>
        <div style="flex:1">
          <div class="cal-date-label" style="${isPast&&!isToday?'color:var(--muted)':''}">${fd.weekday}${todayLabel}</div>
          <div class="cal-date-sub">${dayItems.length} partida${dayItems.length>1?'s':''}${doneLabel}</div>
        </div>
        <span class="cal-arrow" style="color:var(--muted);font-size:.65rem;margin-right:.3rem">${startExpanded?'▲':'▼'}</span>
      </div>
      <div class="cal-matches" style="display:${startExpanded?'grid':'none'};padding:.65rem;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:.65rem"></div>`;
    body.appendChild(dayDiv);
    const grid=dayDiv.querySelector('.cal-matches');
    dayItems.forEach(item=>grid.appendChild(makeInfoCard(item)));
  });
}

function calcStandings(g){
  const tbl={};
  state.groupMatches[g].forEach(m=>{
    if(m.home&&!isRepSlot(m.home)&&m.home!=='?')tbl[m.home]=tbl[m.home]||{pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
    if(m.away&&!isRepSlot(m.away)&&m.away!=='?')tbl[m.away]=tbl[m.away]||{pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
  });
  groupsBase[g].forEach(t=>{
    if(!isRepSlot(t)&&!tbl[t])tbl[t]={pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
  });
  state.groupMatches[g].forEach(m=>{
    const hk=m.home,ak=m.away;
    if(!hk||!ak||isRepSlot(hk)||isRepSlot(ak)||hk==='?'||ak==='?')return;
    if(m.hs===null||m.as===null)return;
    if(!tbl[hk])tbl[hk]={pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
    if(!tbl[ak])tbl[ak]={pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
    tbl[hk].pj++;tbl[ak].pj++;
    tbl[hk].gp+=m.hs;tbl[hk].gc+=m.as;tbl[ak].gp+=m.as;tbl[ak].gc+=m.hs;
    tbl[hk].sg+=m.hs-m.as;tbl[ak].sg+=m.as-m.hs;
    if(m.hs>m.as){tbl[hk].pts+=3;tbl[hk].v++;tbl[ak].d++;}
    else if(m.hs<m.as){tbl[ak].pts+=3;tbl[ak].v++;tbl[hk].d++;}
    else{tbl[hk].pts++;tbl[ak].pts++;tbl[hk].e++;tbl[ak].e++;}
  });
  return Object.entries(tbl).map(([name,s])=>({name,...s}))
    .sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);
}

  const v=document.getElementById('view-grupos');

}

function renderTerceiros() {
  const sec = document.getElementById('terceiros-section');
  if (!sec) return;

  // 1. Coleta o 3º colocado de cada um dos 12 grupos (A-L)
  const rankingGeral = [];
  Object.keys(groupsBase).forEach(g => {
    const st = calcStandings(g);
    if (st && st.length >= 3) {
      // Verifica se o grupo já terminou (todos os 6 jogos preenchidos)
      const matches = state.groupMatches[g] || [];
      const finished = matches.length >= 6 && matches.every(m => m.hs !== null && m.as !== null);
      rankingGeral.push({ grupo: g, ...st[2], finished });
    }
  });

  // 2. Ordena pelo critério oficial: Pts > SG > GP
  rankingGeral.sort((a, b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);

  // 3. Gera o HTML do Ranking Geral Único
  sec.innerHTML = `
    <div class="match-section-title" style="margin-top:1.8rem">🥉 Ranking Geral dos Terceiros Colocados</div>
    <div style="font-size:.71rem;color:var(--muted);margin-bottom:1rem">
      Os <strong style="color:var(--green)">8 melhores</strong> avançam para a Rodada de 32. 
      Critérios: Pontos > Saldo > Gols Pró.
    </div>
    <div style="background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden">
      <table style="width:100%; border-collapse:collapse">
        <thead>
          <tr style="background:rgba(255,255,255,.025)">
            <th style="padding:.6rem; font-size:.65rem; text-transform:uppercase; color:var(--muted); text-align:center; width:40px">Pos</th>
            <th style="padding:.6rem; font-size:.65rem; text-transform:uppercase; color:var(--muted); text-align:center; width:50px">Grp</th>
            <th style="padding:.6rem; font-size:.65rem; text-transform:uppercase; color:var(--muted); text-align:left">Seleção</th>
            <th style="padding:.6rem; font-size:.65rem; color:var(--muted); text-align:center">PTS</th>
            <th style="padding:.6rem; font-size:.65rem; color:var(--muted); text-align:center">SG</th>
            <th style="padding:.6rem; font-size:.65rem; color:var(--muted); text-align:center">GP</th>
            <th style="padding:.6rem; font-size:.65rem; text-transform:uppercase; color:var(--muted); text-align:center">Status</th>
          </tr>
        </thead>
        <tbody id="ranking-geral-body"></tbody>
      </table>
    </div>`;

  const tbody = document.getElementById('ranking-geral-body');
  rankingGeral.forEach((t, i) => {
    const isQualified = i < 8;
    const opacity = t.pj > 0 ? 1 : 0.5; // Esmaece grupos sem jogos
    const rowBg = isQualified ? 'rgba(34, 197, 94, 0.05)' : 'rgba(239, 68, 68, 0.05)';
    const statusColor = isQualified ? 'var(--green)' : 'var(--red)';
    const statusText = isQualified ? 'CLASSIFICADO' : 'ELIMINADO';

    tbody.innerHTML += `
      <tr style="border-top:1px solid rgba(255,255,255,.04); background:${rowBg}; opacity:${opacity}">
        <td style="text-align:center; padding:.6rem; font-weight:bold; color:${isQualified ? 'var(--yellow)' : 'var(--muted)'}">${i + 1}º</td>
        <td style="text-align:center; padding:.6rem; color:var(--muted)">${t.grupo}</td>
        <td style="padding:.6rem; font-size:.8rem; font-weight:600">${t.name}</td>
        <td style="text-align:center; font-weight:bold; color:var(--gold2)">${t.pts}</td>
        <td style="text-align:center; color:${t.sg >= 0 ? 'var(--green)' : 'var(--red)'}">${t.sg > 0 ? '+' : ''}${t.sg}</td>
        <td style="text-align:center; color:var(--muted)">${t.gp}</td>
        <td style="text-align:center; font-size:.6rem; font-weight:bold; color:${statusColor}">${statusText}</td>
      </tr>`;
  });
}

function slotLabel(code) {
  if (!code || code === '?') return '?';
  const gm = code.match(/^([A-L])([12])$/);
  if (gm) return `${gm[2] === '1' ? '1º' : '2º'} Grp ${gm[1]}`;
  const tm = code.match(/^3-([1-8])$/);
  if (tm) return displaySlot(code);  // ← Usar displaySlot em vez de "Chave"
  return code;
}
  
  function renderKnockout(){
  const v=document.getElementById('view-matamata');

  // Contar quantos slots R32 já estão resolvidos
  const r32Resolved = KO_R32_SLOTS.filter(s =>
    resolveSlotToName(s.home) !== null && resolveSlotToName(s.away) !== null
  ).length;
  const r32Total = KO_R32_SLOTS.length;
  const allResolved = r32Resolved === r32Total;

  // Preview do chaveamento R32 com slots e nomes
  let previewHtml = `
    <div style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;flex-wrap:wrap;gap:.5rem">
        <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:var(--gold)">
          ⚔️ Chaveamento — Rodada de 32
        </h3>
        <span style="font-size:.7rem;color:${allResolved?'var(--green)':'var(--muted)'}">
          ${allResolved ? '✓ Todos os times definidos' : `${r32Resolved}/${r32Total} times definidos`}
        </span>
      </div>
      <div class="slot-legend">
        <strong>Legenda:</strong>
        <span><strong style="color:var(--gold)">A1</strong> = 1º Grupo A</span>
        <span><strong style="color:var(--gold)">B2</strong> = 2º Grupo B</span>
        <span><strong style="color:var(--gold)">Chave N</strong> = vencedor da Chave N de 3ºs colocados</span>
        <span style="color:var(--green)">Nome em verde = time já definido</span>
        <span style="color:var(--slot-color);font-style:italic">Itálico dourado = aguardando grupos</span>
      </div>
      <div class="r32-preview">`;

  const BLOCO_LABELS = ['Bloco 1', 'Bloco 2', 'Bloco 3', 'Bloco 4'];
  KO_R32_SLOTS.forEach((slot, i) => {
    const homeName = resolveSlotToName(slot.home);
    const awayName = resolveSlotToName(slot.away);
    const homeDisplay = homeName || displaySlot(slot.home);
    const awayDisplay = awayName || displaySlot(slot.away);
    const homeClass = homeName ? 'r32-team-name' : 'r32-team-name is-slot';
    const awayClass = awayName ? 'r32-team-name' : 'r32-team-name is-slot';
    const m = state.knockout.r32[i];
    const hasResult = m && m.hs !== null;
    const resHtml = hasResult
      ? `<span style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--gold2);margin-left:auto;white-space:nowrap">${m.hs}×${m.as}</span>`
      : '';
    // Separador de bloco a cada 4 partidas (exceto antes da 1ª)
    if (i > 0 && i % 4 === 0) {
      previewHtml += `
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:.6rem;margin:.2rem 0">
        <div style="flex:1;height:1px;background:rgba(212,160,23,.2)"></div>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:.12em;color:var(--gold);opacity:.7">${BLOCO_LABELS[i/4]}</span>
        <div style="flex:1;height:1px;background:rgba(212,160,23,.2)"></div>
      </div>`;
    }
    previewHtml += `
      <div class="r32-preview-card" style="${hasResult?'border-color:rgba(34,197,94,.3)':''}">
        <span class="r32-preview-num">${i+1}</span>
        <div class="r32-preview-teams">
          <span style="display:inline-flex;align-items:center;gap:.3rem;flex-wrap:wrap">
            <span class="slot-badge">${slot.home}</span><span class="${homeClass}">${homeDisplay}</span>
          </span>
          <span class="r32-vs">vs</span>
          <span style="display:inline-flex;align-items:center;gap:.3rem;flex-wrap:wrap">
            <span class="slot-badge">${slot.away}</span><span class="${awayClass}">${awayDisplay}</span>
          </span>
        </div>
        ${resHtml}
      </div>`;
  });

  previewHtml += `</div></div>`;

  v.innerHTML=`<div class="readonly-note">👁 Somente leitura — insira resultados na aba Partidas</div>
    ${previewHtml}
    <div class="bracket-outer"><div class="bracket" id="brk"></div></div>`;

  const brk=document.getElementById('brk');
  koRounds.forEach(round=>{
    const col=document.createElement('div');col.className='bracket-round';
    col.innerHTML=`<div class="round-title">${round.label}</div>`;
    const wrap=document.createElement('div');wrap.className='bracket-matches';
    state.knockout[round.key].forEach((m, mi)=>{
      // Para R32: resolver os slots para nomes reais (se disponíveis)
      let homeVal = m.home;
      let awayVal = m.away;
      if(round.key === 'r32') {
        const slot = KO_R32_SLOTS[mi];
        if(slot) {
          homeVal = resolveSlotToName(slot.home) || slot.home;
          awayVal = resolveSlotToName(slot.away) || slot.away;
        }
      }

      const w=getWinner({...m, home:homeVal, away:awayVal});
      const hWin=w!==null&&w===homeVal,aWin=w!==null&&w===awayVal;
      const isDraw=m.hs!==null&&m.as!==null&&m.hs===m.as;
      const hPen=isDraw&&m.hpen!==null?`<span class="bracket-pen">(${m.hpen})</span>`:'';
      const aPen=isDraw&&m.apen!==null?`<span class="bracket-pen">(${m.apen})</span>`:'';

      // Para R32: verificar se slot ainda não está resolvido
      const homeIsPending = round.key === 'r32' && resolveSlotToName(KO_R32_SLOTS[mi]?.home) === null;
      const awayIsPending = round.key === 'r32' && resolveSlotToName(KO_R32_SLOTS[mi]?.away) === null;
      const homeLabel = homeIsPending ? displaySlot(KO_R32_SLOTS[mi]?.home) : homeVal;
      const awayLabel = awayIsPending ? displaySlot(KO_R32_SLOTS[mi]?.away) : awayVal;

      const el=document.createElement('div');el.className='bracket-match';
      el.innerHTML=`
        <div class="bracket-team${hWin?' winner':''}${homeIsPending?' slot-pending':''}">
          <span>${homeLabel}</span>
          <span style="display:flex;align-items:center;gap:2px">
            <span class="bracket-score-k">${m.hs!==null?m.hs:''}</span>${hPen}
          </span>
        </div>
        <div class="bracket-team${aWin?' winner':''}${awayIsPending?' slot-pending':''}">
          <span>${awayLabel}</span>
          <span style="display:flex;align-items:center;gap:2px">
            <span class="bracket-score-k">${m.as!==null?m.as:''}</span>${aPen}
          </span>
        </div>`;
      wrap.appendChild(el);
    });
    col.appendChild(wrap);brk.appendChild(col);
  });
}

function renderRepescagem(){
  const v=document.getElementById('view-repescagem');
  v.innerHTML=`<div class="readonly-note">👁 Somente leitura — insira resultados na aba Partidas</div>`;
  [['europeia','🇪🇺 Repescagem Europeia — 4 vagas'],['mundial','🌍 Repescagem Mundial — 2 vagas']].forEach(([tipo,title])=>{
    const sec=document.createElement('div');
    sec.innerHTML=`<div class="match-section-title">${title}</div>`;
    const grid=document.createElement('div');grid.className='rep-grid';
    repDef.filter(r=>r.tipo===tipo).forEach(rep=>{
      const card=document.createElement('div');card.className='rep-card';
      const winner=getRepFinalWinner(rep);
      let rows='';
      rep.partidas.forEach(p=>{
        let home=p.home,away=p.away;
        if(p.stage==='FIN'){const t=getRepFinalTeams(rep);home=t.home;away=t.away;}
        const sc=state.repScores[rep.id]?.[p.id]||{};
        const m={home,away,hs:sc.hs??null,as:sc.as??null,hpen:sc.hpen??null,apen:sc.apen??null};
        const w=getWinner(m);
        const hWin=w&&w===home,aWin=w&&w===away;
        const isDraw=m.hs!==null&&m.as!==null&&m.hs===m.as;
        rows+=`<div class="rep-match-row">
          <span class="rep-stage">${p.stage}</span>
          <span class="rep-team" style="font-weight:${hWin?700:400};color:${hWin?'var(--gold2)':'var(--text)'}">${home||'?'}</span>
          <span class="rep-score">${m.hs!==null?m.hs:'–'}</span>
          <span style="color:var(--muted);font-size:.68rem">×</span>
          <span class="rep-score">${m.as!==null?m.as:'–'}</span>
          <span class="rep-team right" style="font-weight:${aWin?700:400};color:${aWin?'var(--gold2)':'var(--text)'}">${away||'?'}</span>
        </div>
        ${isDraw&&(m.hpen!==null||m.apen!==null)?`<div class="rep-match-row" style="background:rgba(167,139,250,.05)">
          <span class="rep-stage" style="color:var(--pen)">PEN</span>
          <span class="rep-team" style="color:var(--pen);font-weight:${m.hpen>m.apen?700:400}">${home||'?'}</span>
          <span class="rep-score pen">${m.hpen??'–'}</span>
          <span style="color:var(--pen);font-size:.68rem">×</span>
          <span class="rep-score pen">${m.apen??'–'}</span>
          <span class="rep-team right" style="color:var(--pen);font-weight:${m.apen>m.hpen?700:400}">${away||'?'}</span>
        </div>`:''}`;
      });
      card.innerHTML=`
        <div class="rep-card-header"><span class="rep-card-title">${rep.label}</span><span class="rep-group-badge">→ Grupo ${rep.groupLetter}</span></div>
        ${rep.note?`<div class="rep-note">ℹ️ ${rep.note}</div>`:''}
        ${rows}
        ${winner?`<div class="rep-winner-row">✓ Classificado: <strong>${winner}</strong></div>`:`<div class="rep-pending">Aguardando resultados...</div>`}`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);v.appendChild(sec);
  });
}

function thCol(key,sortKey,label){
  const isSort=playerSort.col===sortKey;
  const arrow=isSort?(playerSort.dir===1?'↑':'↓'):'↕';
  return`<th class="${isSort?'sorted':''}" onclick="sortPlayers('${sortKey}')">${label}<span class="sort-arrow${isSort?' active':''}">${arrow}</span></th>`;
}
function sortPlayers(col){
  if(playerSort.col===col)playerSort.dir*=-1;
  else{playerSort.col=col;playerSort.dir=-1;}
  renderJogadores();
}

function renderPlayersBody(){
  let list=[...state.jogadores].map(j=>({...j,pontuacao:calcPontuacao(j)}));
  if(playerSearch){const q=playerSearch.toLowerCase();list=list.filter(j=>j.nome.toLowerCase().includes(q)||(j.pais||'').toLowerCase().includes(q));}
  if(playerFilterPos)list=list.filter(j=>j.posicao===playerFilterPos);
  if(playerFilterPais)list=list.filter(j=>j.pais===playerFilterPais);
  const col=playerSort.col,dir=playerSort.dir;
  list.sort((a,b)=>{
    const av=typeof a[col]==='string'?a[col].toLowerCase():a[col]??0;
    const bv=typeof b[col]==='string'?b[col].toLowerCase():b[col]??0;
    return av<bv?-dir:av>bv?dir:0;
  });
  const tbody=document.getElementById('players-body');
  if(!tbody)return;
  if(list.length===0){
    tbody.innerHTML=`<tr><td colspan="14" style="text-align:center;color:var(--muted);padding:1.5rem">Nenhum jogador encontrado.</td></tr>`;
    return;
  }
  tbody.innerHTML=list.map((j,rank)=>{
    const posCls=`pos-${j.posicao||'M'}`;
    const fromCsv=!!j.fromCsv;
    const isGol=j.posicao==='G';
    const pts=j.pontuacao;
    const ptsColor=pts>0?'var(--gold2)':pts<0?'var(--red)':'var(--muted)';
    const ptsStr=pts>0?`+${pts}`:String(pts);
    const isSortingByPts=playerSort.col==='pontuacao';
    const rankLabel=isSortingByPts
      ?(rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':`${rank+1}`)
      :`${rank+1}`;
    const statCell=(val,field,cls)=>fromCsv
      ?`<td style="font-weight:600;text-align:center">${val||0}</td>`
      :`<td><input class="p-input num ${cls}" type="number" min="0" value="${val||0}" onchange="updatePlayer(${j.id},'${field}',this.value)"></td>`;
    const defVal=j.defesas||0;
    const defCell=fromCsv
      ?`<td style="font-weight:600;text-align:center;color:${isGol&&defVal>0?'#34d399':'var(--muted)'}">${defVal||0}</td>`
      :`<td><input class="p-input num def-stat" type="number" min="0" value="${defVal}" onchange="updatePlayer(${j.id},'defesas',this.value)"></td>`;
    const penVal=j.penaltis||0;
    const penDisplay=penVal>0?`+${penVal}`:String(penVal);
    const penColor=penVal>0?'var(--pen)':penVal<0?'var(--red)':'var(--muted)';
    const penCell=fromCsv
      ?`<td style="font-weight:600;text-align:center;color:${penColor}">${penVal!==0?penDisplay:'0'}</td>`
      :`<td><input class="p-input num pen-stat" type="number" value="${penVal}" onchange="updatePlayer(${j.id},'penaltis',this.value)" title="Positivo=pênalti defendido(GOL); Negativo=pênalti perdido"></td>`;
    return`<tr>
      <td style="text-align:center;font-size:.8rem;color:var(--muted);font-family:'Bebas Neue',sans-serif">${rankLabel}</td>
      <td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted)">${j.numero||'–'}</td>
      <td style="font-weight:600;white-space:nowrap">${j.nome}${fromCsv?`<span style="font-size:.52rem;background:rgba(96,165,250,.15);color:var(--blue);border-radius:3px;padding:1px 4px;margin-left:4px;font-weight:700">${j.csvId}</span>`:''}</td>
      <td style="white-space:nowrap">${j.pais||'–'}</td>
      <td><span class="pos-badge ${posCls}">${j.posicao||'–'}</span></td>
      <td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:${ptsColor};font-weight:700">${ptsStr}</td>
      ${statCell(j.gols,'gols','')}
      ${statCell(j.assistencias,'assistencias','assist-stat')}
      ${statCell(j.amarelos,'amarelos','yellow-stat')}
      ${statCell(j.vermelhos,'vermelhos','red-stat')}
      ${statCell(j.golsContra,'golsContra','red-stat')}
      ${defCell}
      ${penCell}
      <td>${fromCsv?'':'<button class="btn-del-player" onclick="deletePlayer('+j.id+')" title="Remover">✕</button>'}</td>
    </tr>`;
  }).join('');
}

function updatePlayer(id,field,val){
  const j=state.jogadores.find(x=>x.id===id);
  if(!j)return;
  j[field]=isNaN(Number(val))?val:(Number(val)||0);
  saveState();renderJogadores();renderStats();
}
function deletePlayer(id){
  if(!confirm('Remover jogador?'))return;
  state.jogadores=state.jogadores.filter(x=>x.id!==id);
  saveState();renderJogadores();renderStats();
}

function openAddPlayer(){
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>+ Novo Jogador</h3>
      <div class="modal-grid full"><div>
        <div class="modal-label">Nome *</div>
        <input class="modal-input" id="p-nome" placeholder="Ex: Vinicius Jr." autofocus>
      </div></div>
      <div class="modal-grid">
        <div>
          <div class="modal-label">País *</div>
          <input class="modal-input" id="p-pais" list="paises-list" placeholder="Ex: Brasil 🇧🇷">
          <datalist id="paises-list">${allCountries.map(c=>`<option value="${c}">`).join('')}</datalist>
        </div>
        <div>
          <div class="modal-label">Número</div>
          <input class="modal-input" id="p-num" type="number" min="1" max="99" placeholder="Ex: 7">
        </div>
      </div>
      <div class="modal-grid">
        <div>
          <div class="modal-label">Posição</div>
          <select class="modal-select" id="p-pos">
            ${POSICOES.map(p=>`<option value="${p}">${POS_LABELS[p]} (${p})</option>`).join('')}
          </select>
        </div>
        <div>
          <div class="modal-label">Gols</div>
          <input class="modal-input" id="p-gols" type="number" min="0" value="0">
        </div>
      </div>
      <div class="modal-grid">
        <div>
          <div class="modal-label">Assistências</div>
          <input class="modal-input" id="p-assist" type="number" min="0" value="0">
        </div>
        <div>
          <div class="modal-label">Cartões (🟨 / 🟥)</div>
          <div style="display:flex;gap:.4rem">
            <input class="modal-input" id="p-amar" type="number" min="0" value="0" placeholder="🟨">
            <input class="modal-input" id="p-verm" type="number" min="0" value="0" placeholder="🟥">
          </div>
        </div>
      </div>
      <div class="modal-section-title">🧤 Estatísticas de Goleiro / Pênaltis</div>
      <div class="modal-grid">
        <div>
          <div class="modal-label">🧤 Defesas <span style="font-size:.6rem;color:var(--muted)">(+1 pt cada — só GOL)</span></div>
          <input class="modal-input" id="p-def" type="number" min="0" value="0">
        </div>
        <div>
          <div class="modal-label">🥅 Pênaltis <span style="font-size:.6rem;color:var(--muted)">(+GOL= pên. def.; −outros= pên. perdido)</span></div>
          <input class="modal-input" id="p-pen" type="number" value="0" placeholder="Ex: 1 ou -1">

      </div>
    </div>
  </div>`;

}

function confirmAddPlayer(){
  const nome=document.getElementById('p-nome').value.trim();
  const pais=document.getElementById('p-pais').value.trim();
  if(!nome||!pais){alert('Nome e País são obrigatórios.');return;}
  state.jogadores.push({
    id:state._nextId++,nome,pais,
    numero:parseInt(document.getElementById('p-num').value)||null,
    posicao:document.getElementById('p-pos').value,
    gols:parseInt(document.getElementById('p-gols').value)||0,
    assistencias:parseInt(document.getElementById('p-assist').value)||0,
    amarelos:parseInt(document.getElementById('p-amar').value)||0,
    vermelhos:parseInt(document.getElementById('p-verm').value)||0,
    golsContra:0,
    defesas:parseInt(document.getElementById('p-def').value)||0,
    penaltis:parseInt(document.getElementById('p-pen').value)||0,
  });
  saveState();closeModal();renderJogadores();renderStats();toast(`✓ ${nome} adicionado!`);
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ══════════════════════════════════════════════════════
// ESTATÍSTICAS
// ══════════════════════════════════════════════════════
function renderStats(){
  const {goals,matches,played}=calcGlobalStats();
  const v=document.getElementById('view-stats');
  const topPts=[...state.jogadores].map(j=>({...j,pontuacao:calcPontuacao(j)})).filter(j=>j.pontuacao!==0).sort((a,b)=>b.pontuacao-a.pontuacao).slice(0,20);
  const topGols=[...state.jogadores].filter(j=>j.gols>0).sort((a,b)=>b.gols-a.gols).slice(0,20);
  const topGC=[...state.jogadores].filter(j=>j.golsContra>0).sort((a,b)=>b.golsContra-a.golsContra).slice(0,20);
  const topAssist=[...state.jogadores].filter(j=>j.assistencias>0).sort((a,b)=>b.assistencias-a.assistencias).slice(0,20);
  const topAmar=[...state.jogadores].filter(j=>j.amarelos>0).sort((a,b)=>b.amarelos-a.amarelos).slice(0,20);
  const topVerm=[...state.jogadores].filter(j=>j.vermelhos>0).sort((a,b)=>b.vermelhos-a.vermelhos).slice(0,20);
  const topDef=[...state.jogadores].filter(j=>j.posicao==='G'&&(j.defesas||0)>0).sort((a,b)=>(b.defesas||0)-(a.defesas||0)).slice(0,20);
  const topPenDef=[...state.jogadores].filter(j=>j.posicao==='G'&&(j.penaltis||0)>0).sort((a,b)=>(b.penaltis||0)-(a.penaltis||0)).slice(0,20);
  const totalDefesas=state.jogadores.reduce((s,j)=>s+(j.defesas||0),0);
  const totalPenDef=state.jogadores.filter(j=>j.posicao==='G').reduce((s,j)=>s+Math.max(0,j.penaltis||0),0);
  const totalPenPerd=state.jogadores.filter(j=>j.posicao!=='G').reduce((s,j)=>s+Math.abs(Math.min(0,j.penaltis||0)),0);
  function rankTable(list,statKey,statLabel,color){
    if(list.length===0)return`<div style="color:var(--muted);font-size:.78rem;padding:.6rem 0">Nenhum dado ainda.</div>`;
    return`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <table class="rank-table">
        <thead><tr><th>#</th><th>Jogador</th><th>País</th><th>${statLabel}</th></tr></thead>
        <tbody>${list.map((j,i)=>{
          const raw=statKey==='pontuacao'?j[statKey]:(statKey==='penaltis'?Math.max(0,j[statKey]||0):j[statKey]);
          const val=statKey==='pontuacao'?(raw>0?`+${raw}`:String(raw)):raw;
          return`<tr>
            <td><span class="rank-badge ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</span></td>
            <td style="font-weight:600">${j.nome}</td><td>${j.pais}</td>
            <td style="font-weight:700;color:${color}">${val}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  }
  v.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">⚽ Total de Gols</div><div class="stat-value">${goals}</div><div class="stat-sub">todos os jogos disputados</div></div>
      <div class="stat-card"><div class="stat-label">📈 Média / Partida</div><div class="stat-value">${played>0?(goals/played).toFixed(2):'—'}</div><div class="stat-sub">gols por jogo</div></div>
      <div class="stat-card"><div class="stat-label">🎮 Partidas Jogadas</div><div class="stat-value">${played}</div><div class="stat-sub">de ${matches} no torneio completo</div></div>
      <div class="stat-card"><div class="stat-label">👤 Jogadores</div><div class="stat-value">${state.jogadores.length}</div><div class="stat-sub">${[...new Set(state.jogadores.map(j=>j.pais))].length} países</div></div>
      <div class="stat-card"><div class="stat-label">⚽ Gols (jogadores)</div><div class="stat-value">${state.jogadores.reduce((s,j)=>s+(j.gols||0)+(j.golsContra||0),0)}</div><div class="stat-sub">incluindo ${state.jogadores.reduce((s,j)=>s+(j.golsContra||0),0)} gol(s) contra</div></div>
      <div class="stat-card"><div class="stat-label">🟨 Amarelos</div><div class="stat-value">${state.jogadores.reduce((s,j)=>s+(j.amarelos||0),0)}</div></div>
      <div class="stat-card"><div class="stat-label">🟥 Vermelhos</div><div class="stat-value">${state.jogadores.reduce((s,j)=>s+(j.vermelhos||0),0)}</div></div>
      <div class="stat-card"><div class="stat-label">🅰️ Assistências</div><div class="stat-value">${state.jogadores.reduce((s,j)=>s+(j.assistencias||0),0)}</div></div>
      <div class="stat-card"><div class="stat-label">🧤 Defesas (goleiros)</div><div class="stat-value" style="color:#34d399">${totalDefesas}</div><div class="stat-sub">+1 pt cada</div></div>
      <div class="stat-card"><div class="stat-label">🥅 Pênaltis defendidos</div><div class="stat-value" style="color:var(--pen)">${totalPenDef}</div><div class="stat-sub">+100 pts por goleiro</div></div>
      <div class="stat-card"><div class="stat-label">🥅 Pênaltis perdidos</div><div class="stat-value" style="color:var(--red)">${totalPenPerd}</div><div class="stat-sub">−10 pts por jogador de linha</div></div>
    </div>
    <div class="stats-cols">
      <div><div class="stats-section-title">🥅 Artilheiros</div>${rankTable(topGols,'gols','Gols','var(--gold2)')}</div>
      <div><div class="stats-section-title">🅰️ Assistências</div>${rankTable(topAssist,'assistencias','Assist.','var(--blue)')}</div>
    </div>
    <div class="stats-cols" style="margin-top:1rem">
      <div><div class="stats-section-title">🧤 Defesas (goleiros)</div>${rankTable(topDef,'defesas','Defesas','#34d399')}</div>
      <div><div class="stats-section-title">🥅 Pênaltis Defendidos (goleiros)</div>${rankTable(topPenDef,'penaltis','Pên. Def.','var(--pen)')}</div>
    </div>
    <div class="stats-cols" style="margin-top:1rem">
      <div><div class="stats-section-title">🟨 Cartões Amarelos</div>${rankTable(topAmar,'amarelos','Amar.','var(--yellow)')}</div>
      <div><div class="stats-section-title">🟥 Cartões Vermelhos</div>${rankTable(topVerm,'vermelhos','Verm.','var(--red)')}</div>
      <div><div class="stats-section-title">⚽↩ Gols Contra</div>${rankTable(topGC,'golsContra','GC','var(--red)')}</div>
    </div>`;
}

// ══════════════════════════════════════════════════════
// NAV + TOAST
// ══════════════════════════════════════════════════════
function switchTab(btn,tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='partidas')   renderMatches();
  if(tab==='grupos')     renderGroups();
  if(tab==='matamata')   renderKnockout();
  if(tab==='stats')      renderStats();
  if(tab==='jogadores')  renderJogadores();
  if(tab==='repescagem') renderRepescagem();
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ══════════════════════════════════════════════════════
// CSV DE JOGADORES E EVENTOS
// ══════════════════════════════════════════════════════
async function loadRosters(){
  try{
    const r=await fetch('jogadores.csv');
    if(!r.ok)throw new Error('jogadores.csv não encontrado');
    const text=await r.text();
    const lines=text.trim().split('\n').filter(l=>!l.startsWith('#'));
    const headers=lines[0].split(',').map(h=>h.replace(/\r/g,'').trim());
    const csvPlayers=lines.slice(1).map(line=>{
      const cols=line.split(',');
      const obj={};
      headers.forEach((h,i)=>obj[h]=(cols[i]||'').replace(/\r/g,'').trim());
      return obj;
    }).filter(o=>o.id);
    csvPlayers.forEach(cp=>{
      const existing=state.jogadores.find(j=>j.csvId===cp.id);
      if(existing){
        existing.nome=cp.nome;existing.pais=cp.pais;
        existing.numero=parseInt(cp.numero)||null;
        existing.posicao=cp.posicao;existing.pais_code=cp.pais_code;
      }else{
        state.jogadores.push({
          id:state._nextId++,csvId:cp.id,nome:cp.nome,pais:cp.pais,
          pais_code:cp.pais_code,numero:parseInt(cp.numero)||null,
          posicao:cp.posicao,
          gols:0,assistencias:0,amarelos:0,vermelhos:0,golsContra:0,
          defesas:0,penaltis:0,
          fromCsv:true,
        });
      }
    });
    saveState();
  }catch(e){console.warn('jogadores.csv:',e.message);}
  try{
    const r=await fetch('eventos.csv');
    if(!r.ok)throw new Error('eventos.csv não encontrado');
    const text=await r.text();
    const lines=text.trim().split('\n').filter(l=>!l.startsWith('#')&&l.trim());
    if(lines.length<2)return;
    const headers=lines[0].split(',').map(h=>h.replace(/\r/g,'').trim());
    state.jogadores.forEach(j=>{
      if(j.fromCsv){
        j.gols=0;j.assistencias=0;j.amarelos=0;j.vermelhos=0;
        j.golsContra=0;j.defesas=0;j.penaltis=0;
      }
    });
    lines.slice(1).forEach(line=>{
      if(!line.trim())return;
      const cols=line.split(',');
      const obj={};
      headers.forEach((h,i)=>obj[h]=(cols[i]||'').replace(/\r/g,'').trim());
      const jog=state.jogadores.find(j=>j.csvId===obj.jogador_id);
      if(!jog)return;
      jog.gols        +=parseInt(obj.gols)        ||0;
      jog.assistencias+=parseInt(obj.assistencias)||0;
      jog.amarelos    +=parseInt(obj.amarelo)      ||0;
      jog.vermelhos   +=parseInt(obj.vermelho)     ||0;
      jog.golsContra  +=parseInt(obj.gol_contra)   ||0;
      jog.defesas     +=parseInt(obj.defesas)       ||0;
      jog.penaltis    +=parseInt(obj.penaltis)       ||0;
    });
    saveState();
  }catch(e){console.warn('eventos.csv:',e.message);}
}
