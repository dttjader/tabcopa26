<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#D4A017;--gold2:#F5C842;
    --dark:#0A0C10;--card:#111318;--border:#1E2230;
    --text:#E8EAF0;--muted:#6B7280;
    --green:#22C55E;--red:#EF4444;--yellow:#EAB308;
    --pen:#A78BFA;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(212,160,23,.08) 0%,transparent 60%),
                     radial-gradient(ellipse at 80% 100%,rgba(59,130,246,.06) 0%,transparent 60%)}
  header{text-align:center;padding:2rem 1rem 1.2rem;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(212,160,23,.05) 0%,transparent 100%)}
  header .eyebrow{font-size:.68rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:.4rem}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,6vw,4rem);letter-spacing:.05em;
    background:linear-gradient(135deg,#F5C842 0%,#D4A017 50%,#F5C842 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
  header p{color:var(--muted);font-size:.82rem;margin-top:.4rem}
  nav.tabs{display:flex;justify-content:center;gap:.4rem;padding:1.2rem 1rem 0;flex-wrap:wrap}
  .tab-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.45rem 1.1rem;
    border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s}
  .tab-btn:hover{border-color:var(--gold);color:var(--gold)}
  .tab-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
  .container{max-width:1200px;margin:0 auto;padding:1.5rem 1rem 3rem}
  .view{display:none}.view.active{display:block}

  /* ── GRUPOS (leitura) ── */
  .legend{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;font-size:.73rem;color:var(--muted)}
  .legend-item{display:flex;align-items:center;gap:.4rem}
  .legend-dot{width:10px;height:10px;border-radius:2px}
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
  .group-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .group-header{background:linear-gradient(135deg,rgba(212,160,23,.15),rgba(212,160,23,.05));
    padding:.65rem 1rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;
    color:var(--gold);border-bottom:1px solid var(--border)}
  .group-table{width:100%;border-collapse:collapse}
  .group-table th{padding:.38rem .55rem;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);text-align:center;font-weight:500}
  .group-table th:first-child{text-align:left}
  .group-table td{padding:.5rem .55rem;font-size:.8rem;text-align:center;border-top:1px solid rgba(255,255,255,.04)}
  .group-table td:first-child{text-align:left}
  .team-cell{display:flex;align-items:center;gap:.4rem;font-weight:500;font-size:.78rem}
  .pts-cell{font-weight:700;color:var(--gold2)}
  .qualify-1 td:first-child{border-left:3px solid var(--green)}
  .qualify-2 td:first-child{border-left:3px solid #86efac}
  .qualify-3 td:first-child{border-left:3px solid var(--yellow)}
  .eliminate td:first-child{border-left:3px solid transparent}
  .rep-badge{display:inline-block;font-size:.52rem;background:rgba(212,160,23,.2);color:var(--gold);
    border-radius:3px;padding:1px 4px;vertical-align:middle;font-weight:700;margin-left:3px}

  /* ── PARTIDAS (controle) ── */
  .phase-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
  .phase-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.38rem 1rem;
    border-radius:8px;font-size:.78rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;font-weight:500}
  .phase-btn:hover{border-color:var(--gold);color:var(--gold)}
  .phase-btn.on{background:rgba(212,160,23,.12);border-color:var(--gold);color:var(--gold2);font-weight:700}
  .filter-bar{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.9rem}
  .filter-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
    padding:.28rem .75rem;border-radius:999px;font-size:.71rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
  .filter-btn:hover,.filter-btn.on{border-color:var(--gold);color:var(--gold)}
  .match-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:var(--gold);
    margin:1rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
  .matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.7rem}

  /* match card */
  .match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem;transition:border-color .15s}
  .match-card.done{border-color:rgba(34,197,94,.3)}
  .match-card.knockout-card{border-color:rgba(212,160,23,.2)}
  .match-card.rep-card{border-color:rgba(167,139,250,.25)}
  .match-info{font-size:.61rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;
    display:flex;justify-content:space-between;align-items:center}
  .match-phase-badge{font-size:.58rem;padding:2px 6px;border-radius:999px;font-weight:700;letter-spacing:.04em}
  .badge-grupo{background:rgba(34,197,94,.12);color:var(--green)}
  .badge-rep{background:rgba(167,139,250,.12);color:var(--pen)}
  .badge-ko{background:rgba(212,160,23,.12);color:var(--gold)}
  .match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.4rem}
  .match-team{display:flex;align-items:center;gap:.3rem;font-size:.78rem;font-weight:600;flex-wrap:wrap;min-width:0}
  .match-team.right{flex-direction:row-reverse;text-align:right;justify-content:flex-start}
  .score-area{display:flex;flex-direction:column;align-items:center;gap:.3rem}
  .score-row{display:flex;align-items:center;gap:.25rem}
  .score-input{width:34px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;
    color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:1.35rem;text-align:center;
    padding:.1rem 0;outline:none;transition:border-color .2s}
  .score-input:focus{border-color:var(--gold)}
  .score-sep{color:var(--muted);font-size:.8rem}
  /* penalty */
  .pen-row{display:none;align-items:center;gap:.3rem;padding:.35rem .5rem;
    background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.2);border-radius:6px;animation:fadeIn .2s}
  .pen-row.visible{display:flex}
  .pen-label{font-size:.6rem;color:var(--pen);font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
  .pen-sep{color:rgba(167,139,250,.4);font-size:.72rem}
  .score-input.pen{color:var(--pen);border-color:rgba(167,139,250,.3);font-size:1.1rem;width:30px}
  .score-input.pen:focus{border-color:var(--pen)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
  .card-actions{display:flex;gap:.35rem;margin-top:.65rem}
  .btn-save{flex:1;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);color:var(--gold);
    border-radius:6px;padding:.3rem;font-size:.71rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .btn-save:hover{background:rgba(212,160,23,.22)}
  .btn-clear{background:transparent;border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:6px;
    padding:.3rem .6rem;font-size:.67rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;opacity:.55}
  .btn-clear:hover{opacity:1;background:rgba(239,68,68,.08)}

  /* ── REPESCAGEM (leitura) ── */
  .rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
  .rep-card{background:var(--card);border:1px solid rgba(167,139,250,.25);border-radius:12px;overflow:hidden}
  .rep-card-header{background:rgba(167,139,250,.07);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
  .rep-card-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.08em;color:var(--pen)}
  .rep-group-badge{font-size:.65rem;color:var(--gold);background:rgba(212,160,23,.12);padding:2px 8px;border-radius:999px}
  .rep-match-row{display:flex;align-items:center;gap:.5rem;padding:.45rem .9rem;border-bottom:1px solid rgba(255,255,255,.04)}
  .rep-match-row:last-child{border-bottom:none}
  .rep-stage{font-size:.6rem;color:var(--muted);font-weight:700;min-width:22px;letter-spacing:.04em}
  .rep-team{flex:1;font-size:.76rem;font-weight:500}
  .rep-team.right{text-align:right}
  .rep-score{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold2);min-width:14px;text-align:center}
  .rep-score.pen{color:var(--pen);font-size:.8rem}
  .rep-winner-row{padding:.5rem .9rem;font-size:.75rem;color:var(--green);border-top:1px solid rgba(255,255,255,.06)}
  .rep-pending{padding:.5rem .9rem;font-size:.73rem;color:var(--muted);font-style:italic}
  .rep-note{padding:.35rem .9rem;font-size:.68rem;color:var(--muted);background:rgba(255,255,255,.02)}

  /* ── MATA-MATA (leitura) ── */
  .bracket-outer{overflow-x:auto;padding:1rem 0}
  .bracket{display:flex;gap:1.2rem;min-width:980px;align-items:stretch}
  .bracket-round{flex:1;display:flex;flex-direction:column}
  .round-title{font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.1em;color:var(--muted);
    text-align:center;margin-bottom:.55rem;padding-bottom:.35rem;border-bottom:1px solid var(--border)}
  .bracket-matches{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:.5rem}
  .bracket-match{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .bracket-team{display:flex;align-items:center;justify-content:space-between;padding:.4rem .55rem;font-size:.73rem;font-weight:500}
  .bracket-team:first-child{border-bottom:1px solid var(--border)}
  .bracket-team.winner{color:var(--gold2);font-weight:700;background:rgba(245,200,66,.06)}
  .bracket-score-k{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gold);min-width:14px;text-align:right}
  .bracket-pen{font-size:.65rem;color:var(--pen);margin-left:3px}

  /* ── STATS ── */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-bottom:1.5rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem}
  .stat-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem}
  .stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.85rem;color:var(--gold2)}
  .stat-sub{font-size:.72rem;color:var(--muted);margin-top:.12rem}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.08em;color:var(--text);margin-bottom:.75rem}
  .scorers-table{width:100%;border-collapse:collapse}
  .scorers-table th{padding:.42rem .65rem;font-size:.61rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)}
  .scorers-table td{padding:.52rem .65rem;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,.04)}
  .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:.63rem;font-weight:700}
  .rank-1{background:var(--gold);color:#000}.rank-2{background:#9CA3AF;color:#000}
  .rank-3{background:#B45309;color:#fff}.rank-n{background:var(--border);color:var(--muted)}
  .goals-input{width:44px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;
    color:var(--gold2);font-weight:700;text-align:center;padding:2px 4px;font-size:.86rem;outline:none;font-family:'DM Sans',sans-serif}

  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--green);color:#000;padding:.52rem 1.3rem;border-radius:999px;
    font-size:.78rem;font-weight:600;transition:transform .3s;z-index:9999;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .readonly-note{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted);
    background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;margin-bottom:1rem}

  @media(max-width:600px){.groups-grid,.matches-grid,.stats-grid,.rep-grid{grid-template-columns:1fr}.bracket{min-width:700px}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">⚽ Edição Especial</div>
  <h1>Copa do Mundo 2026</h1>
  <p>EUA · Canadá · México &nbsp;|&nbsp; 11 Jun – 19 Jul 2026</p>
</header>
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab(this,'partidas')">📋 Partidas</button>
  <button class="tab-btn" onclick="switchTab(this,'grupos')">🏆 Grupos</button>
  <button class="tab-btn" onclick="switchTab(this,'repescagem')">🔁 Repescagem</button>
  <button class="tab-btn" onclick="switchTab(this,'matamata')">⚔️ Mata-Mata</button>
  <button class="tab-btn" onclick="switchTab(this,'stats')">📊 Estatísticas</button>
</nav>
<div class="container">
  <div id="view-partidas"   class="view active"></div>
  <div id="view-grupos"     class="view"></div>
  <div id="view-repescagem" class="view"></div>
  <div id="view-matamata"   class="view"></div>
  <div id="view-stats"      class="view"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// DADOS
// ══════════════════════════════════════════════════════
const groupsBase={
  A:['México 🇲🇽','África do Sul 🇿🇦','Coreia do Sul 🇰🇷','Repescagem Europa 4'],
  B:['Canadá 🇨🇦','Suíça 🇨🇭','Catar 🇶🇦','Repescagem Europa 1'],
  C:['Brasil 🇧🇷','Marrocos 🇲🇦','Escócia 🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti 🇭🇹'],
  D:['EUA 🇺🇸','Paraguai 🇵🇾','Austrália 🇦🇺','Repescagem Europa 3'],
  E:['Alemanha 🇩🇪','Costa do Marfim 🇨🇮','Equador 🇪🇨','Curaçao 🇨🇼'],
  F:['Países Baixos 🇳🇱','Japão 🇯🇵','Tunísia 🇹🇳','Repescagem Europa 2'],
  G:['Bélgica 🇧🇪','Egito 🇪🇬','Irã 🇮🇷','Nova Zelândia 🇳🇿'],
  H:['Espanha 🇪🇸','Uruguai 🇺🇾','Arábia Saudita 🇸🇦','Cabo Verde 🇨🇻'],
  I:['França 🇫🇷','Senegal 🇸🇳','Noruega 🇳🇴','Repescagem Mundial B'],
  J:['Argentina 🇦🇷','Áustria 🇦🇹','Argélia 🇩🇿','Jordânia 🇯🇴'],
  K:['Portugal 🇵🇹','Colômbia 🇨🇴','Uzbequistão 🇺🇿','Repescagem Mundial A'],
  L:['Inglaterra 🇬🇧','Croácia 🇭🇷','Panamá 🇵🇦','Gana 🇬🇭'],
};

// Repescagem: cada objeto contém as partidas (SF + final) como lista plana
const repDef=[
  {id:'rep_eu_1',label:'Repescagem Europa 1',groupLetter:'B',slotIndex:3,tipo:'europeia',
   partidas:[
     {id:'sf1a',stage:'SF',home:'Itália 🇮🇹',away:'Irlanda do Norte 🏴'},
     {id:'sf1b',stage:'SF',home:'País de Gales 🏴',away:'Bósnia 🇧🇦'},
     {id:'fi1', stage:'FIN',home:null,away:null}, // preenchido após SFs
   ]},
  {id:'rep_eu_2',label:'Repescagem Europa 2',groupLetter:'F',slotIndex:3,tipo:'europeia',
   partidas:[
     {id:'sf2a',stage:'SF',home:'Ucrânia 🇺🇦',away:'Suécia 🇸🇪'},
     {id:'sf2b',stage:'SF',home:'Polônia 🇵🇱',away:'Albânia 🇦🇱'},
     {id:'fi2', stage:'FIN',home:null,away:null},
   ]},
  {id:'rep_eu_3',label:'Repescagem Europa 3',groupLetter:'D',slotIndex:3,tipo:'europeia',
   partidas:[
     {id:'sf3a',stage:'SF',home:'Turquia 🇹🇷',away:'Romênia 🇷🇴'},
     {id:'sf3b',stage:'SF',home:'Eslováquia 🇸🇰',away:'Kosovo 🇽🇰'},
     {id:'fi3', stage:'FIN',home:null,away:null},
   ]},
  {id:'rep_eu_4',label:'Repescagem Europa 4',groupLetter:'A',slotIndex:3,tipo:'europeia',
   partidas:[
     {id:'sf4a',stage:'SF',home:'Dinamarca 🇩🇰',away:'Macedônia do Norte 🇲🇰'},
     {id:'sf4b',stage:'SF',home:'República Tcheca 🇨🇿',away:'Irlanda 🇮🇪'},
     {id:'fi4', stage:'FIN',home:null,away:null},
   ]},
  {id:'rep_ic1',label:'Repescagem Mundial A',groupLetter:'K',slotIndex:3,tipo:'mundial',
   note:'RD Congo entra direto na final (melhor ranking FIFA)',
   partidas:[
     {id:'sfm1a',stage:'SF',home:'Nova Caledônia 🇳🇨',away:'Jamaica 🇯🇲'},
     {id:'fim1', stage:'FIN',home:'RD Congo 🇨🇩',away:null},
   ]},
  {id:'rep_ic2',label:'Repescagem Mundial B',groupLetter:'I',slotIndex:3,tipo:'mundial',
   note:'Iraque entra direto na final (melhor ranking FIFA)',
   partidas:[
     {id:'sfm2a',stage:'SF',home:'Bolívia 🇧🇴',away:'Suriname 🇸🇷'},
     {id:'fim2', stage:'FIN',home:'Iraque 🇮🇶',away:null},
   ]},
];

function isRepSlot(n){return n&&(n.startsWith('Repescagem'))}
function makeGroupMatches(t){
  return[
    {home:t[0],away:t[1],hs:null,as:null},
    {home:t[2],away:t[3],hs:null,as:null},
    {home:t[0],away:t[2],hs:null,as:null},
    {home:t[1],away:t[3],hs:null,as:null},
    {home:t[0],away:t[3],hs:null,as:null},
    {home:t[1],away:t[2],hs:null,as:null},
  ];
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const state={
  // grupo: [{home,away,hs,as}]
  groupMatches:{},
  // repescagem: { repId: { partidaId: {hs,as,hpen,apen} } }
  repScores:{},
  // mata-mata: rounds
  knockout:{
    r32:Array(16).fill(0).map(()=>({home:'?',away:'?',hs:null,as:null,hpen:null,apen:null})),
    r16:Array(8).fill(0).map(()=>({home:'?',away:'?',hs:null,as:null,hpen:null,apen:null})),
    qf: Array(4).fill(0).map(()=>({home:'?',away:'?',hs:null,as:null,hpen:null,apen:null})),
    sf: Array(2).fill(0).map(()=>({home:'?',away:'?',hs:null,as:null,hpen:null,apen:null})),
    final:[{home:'?',away:'?',hs:null,as:null,hpen:null,apen:null}],
  },
  scorers:[
    {name:'Kylian Mbappé',  team:'França 🇫🇷',    goals:0},
    {name:'Erling Haaland', team:'Noruega 🇳🇴',   goals:0},
    {name:'Vinicius Jr.',   team:'Brasil 🇧🇷',     goals:0},
    {name:'Jude Bellingham',team:'Inglaterra 🇬🇧', goals:0},
    {name:'Lionel Messi',   team:'Argentina 🇦🇷',  goals:0},
    {name:'Pedri',          team:'Espanha 🇪🇸',    goals:0},
    {name:'Lamine Yamal',   team:'Espanha 🇪🇸',    goals:0},
    {name:'Rodrygo',        team:'Brasil 🇧🇷',     goals:0},
  ],
};

Object.keys(groupsBase).forEach(g=>{state.groupMatches[g]=makeGroupMatches(groupsBase[g])});
repDef.forEach(r=>{state.repScores[r.id]={};});

function saveState(){
  try{localStorage.setItem('copa2026v5',JSON.stringify({
    groupMatches:state.groupMatches,repScores:state.repScores,
    knockout:state.knockout,scorers:state.scorers,
  }));}catch(e){}
}
(function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('copa2026v5')||'null');
    if(!s)return;
    if(s.groupMatches) Object.assign(state.groupMatches,s.groupMatches);
    if(s.repScores)    Object.assign(state.repScores,s.repScores);
    if(s.knockout)     Object.assign(state.knockout,s.knockout);
    if(s.scorers)      state.scorers=s.scorers;
  }catch(e){}
})();

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function getWinner(m){
  if(m.hs===null||m.as===null)return null;
  if(m.hs>m.as)return m.home;
  if(m.as>m.hs)return m.away;
  if(m.hpen!==null&&m.apen!==null){
    if(m.hpen>m.apen)return m.home;
    if(m.apen>m.hpen)return m.away;
  }
  return null;
}

function resolveTeam(name,g){
  if(!isRepSlot(name))return name;
  const rep=repDef.find(r=>r.groupLetter===g);
  if(!rep)return name;
  const fin=rep.partidas.find(p=>p.stage==='FIN');
  const sc=state.repScores[rep.id]?.[fin.id];
  if(!sc)return name;
  const m={...fin,...sc};
  return getWinner(m)||name;
}
function getGroupTeams(g){return groupsBase[g].map(t=>resolveTeam(t,g))}

// Get current home/away for a rep final (derived from SF results)
function getRepFinalTeams(rep){
  const fin=rep.partidas.find(p=>p.stage==='FIN');
  if(rep.tipo==='europeia'){
    const sfs=rep.partidas.filter(p=>p.stage==='SF');
    const w0=getRepWinner(rep,sfs[0]);
    const w1=getRepWinner(rep,sfs[1]);
    return{home:w0||fin.home||'?',away:w1||fin.away||'?'};
  } else {
    const sf=rep.partidas.find(p=>p.stage==='SF');
    const w=getRepWinner(rep,sf);
    return{home:fin.home||'?',away:w||'?'};
  }
}

function getRepWinner(rep,p){
  const sc=state.repScores[rep.id]?.[p.id];
  if(!sc)return null;
  return getWinner({home:p.home,away:p.away,...sc});
}

function getRepFinalWinner(rep){
  const fin=rep.partidas.find(p=>p.stage==='FIN');
  const sc=state.repScores[rep.id]?.[fin.id];
  if(!sc)return null;
  const teams=getRepFinalTeams(rep);
  return getWinner({...teams,...sc});
}

// Sync rep winners into group matches
function syncAllRepToGroups(){
  repDef.forEach(rep=>{
    const winner=getRepFinalWinner(rep);
    const placeholder=groupsBase[rep.groupLetter][rep.slotIndex];
    const name=winner||placeholder;
    state.groupMatches[rep.groupLetter].forEach(m=>{
      if(isRepSlot(m.home))m.home=name;
      if(isRepSlot(m.away))m.away=name;
    });
  });
}

function renderMatchesRep(){
  const body=document.getElementById('matches-body');

  const mundiais=repDef.filter(r=>r.tipo==='mundial');

    html+=`<div class="match-section-title">${title}</div><div class="matches-grid" id="rg_${title.replace(/\s/g,'_')}"></div>`;
  });
  body.innerHTML=html;
  [[europeias,'🇪🇺 Repescagem Europeia'],[mundiais,'🌍 Repescagem Mundial']].forEach(([list,title])=>{
    const grid=document.getElementById('rg_'+title.replace(/\s/g,'_'));
    list.forEach(rep=>{
      rep.partidas.forEach(p=>{
        let home=p.home,away=p.away;
        if(p.stage==='FIN'){
          const t=getRepFinalTeams(rep);
          home=t.home;away=t.away;
        }
        const sc=state.repScores[rep.id]?.[p.id]||{};
        const isFin=p.stage==='FIN';

        grid.appendChild(makeMatchCard({

          badgeClass:'badge-rep',badgeText:'REP',

            if(!state.repScores[rep.id])state.repScores[rep.id]={};
            state.repScores[rep.id][p.id]={hs,as,hpen,apen};
            syncAllRepToGroups();
            saveState();renderGroups();renderRepescagem();renderMatches();

// ══════════════════════════════════════════════════════
// MATCH CARD FACTORY (único componente reutilizável)
// ══════════════════════════════════════════════════════
function makeMatchCard({label,badgeClass,badgeText,home,away,hs,as,hpen,apen,allowPen,note,editable,onSave,onClear}){
  const done=hs!==null&&as!==null;
  const isDraw=done&&hs===as;

  const card=document.createElement('div');
  card.className=`match-card${done?' done':''}`;

  // Team name inputs (editable only for KO)
  const homeField=editable?.home
    ?`<input class="team-input" value="${home}" style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:.78rem;font-weight:600;outline:none;width:100%;font-family:'DM Sans',sans-serif">`
    :`<span>${home}</span>`;
  const awayField=editable?.away
    ?`<input class="team-input" value="${away}" style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:.78rem;font-weight:600;outline:none;width:100%;text-align:right;font-family:'DM Sans',sans-serif">`
    :`<span>${away}</span>`;

  card.innerHTML=`
    <div class="match-info">
      <span>${label}</span>
      <span class="match-phase-badge ${badgeClass}">${badgeText}</span>
    </div>
    ${note?`<div style="font-size:.68rem;color:var(--muted);margin-bottom:.5rem;padding:.25rem .4rem;background:rgba(255,255,255,.03);border-radius:4px">ℹ️ ${note}</div>`:''}
    <div class="match-teams">
      <div class="match-team">${homeField}</div>
      <div class="score-area">
        <div class="score-row">
          <input class="score-input s-h" type="number" min="0" max="30" value="${hs!==null?hs:''}" placeholder="–">
          <span class="score-sep">×</span>
          <input class="score-input s-a" type="number" min="0" max="30" value="${as!==null?as:''}" placeholder="–">
        </div>
        ${allowPen?`<div class="pen-row${isDraw?' visible':''}">
          <span class="pen-label">🥅 Pên.</span>
          <input class="score-input pen p-h" type="number" min="0" value="${hpen!==null?hpen:''}" placeholder="–">
          <span class="pen-sep">×</span>
          <input class="score-input pen p-a" type="number" min="0" value="${apen!==null?apen:''}" placeholder="–">
        </div>`:''}
      </div>
      <div class="match-team right">${awayField}</div>
    </div>
    <div class="card-actions">
      <button class="btn-save">💾 Salvar</button>
      ${done?`<button class="btn-clear">✕</button>`:''}
    </div>`;

  const sH=card.querySelector('.s-h'),sA=card.querySelector('.s-a');
  const pH=card.querySelector('.p-h'),pA=card.querySelector('.p-a');
  const penRow=card.querySelector('.pen-row');

  // Auto-show/hide pen row
  if(allowPen&&penRow){
    function checkDraw(){
      const hv=sH.value,av=sA.value;
      const draw=hv!==''&&av!==''&&parseInt(hv)===parseInt(av);
      penRow.classList.toggle('visible',draw);
      if(!draw){if(pH)pH.value='';if(pA)pA.value='';}
    }
    sH.addEventListener('input',checkDraw);
    sA.addEventListener('input',checkDraw);
  }

  card.querySelector('.btn-save').onclick=()=>{
    const hsV=sH.value!==''?parseInt(sH.value):null;
    const asV=sA.value!==''?parseInt(sA.value):null;
    const isDraw2=hsV!==null&&asV!==null&&hsV===asV;
    const hpenV=allowPen&&isDraw2&&pH&&pH.value!==''?parseInt(pH.value):null;
    const apenV=allowPen&&isDraw2&&pA&&pA.value!==''?parseInt(pA.value):null;
    const homeV=editable?.home?card.querySelector('.team-input').value:null;
    const awayV=editable?.away?card.querySelectorAll('.team-input')[1]?.value:null;
    onSave(hsV,asV,hpenV,apenV,homeV,awayV);
  };

  const clrBtn=card.querySelector('.btn-clear');
  if(clrBtn)clrBtn.onclick=onClear;

  return card;
}

// ══════════════════════════════════════════════════════
// RENDER GRUPOS (leitura)
// ══════════════════════════════════════════════════════
function calcStandings(g){
  const tbl={};
  getGroupTeams(g).forEach(t=>{tbl[t]={pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0}});
  state.groupMatches[g].forEach(m=>{
    const hk=resolveTeam(m.home,g),ak=resolveTeam(m.away,g);
    if(m.hs===null||m.as===null)return;
    if(!tbl[hk])tbl[hk]={pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
    if(!tbl[ak])tbl[ak]={pts:0,pj:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
    tbl[hk].pj++;tbl[ak].pj++;
    tbl[hk].gp+=m.hs;tbl[hk].gc+=m.as;
    tbl[ak].gp+=m.as;tbl[ak].gc+=m.hs;
    tbl[hk].sg+=m.hs-m.as;tbl[ak].sg+=m.as-m.hs;
    if(m.hs>m.as){tbl[hk].pts+=3;tbl[hk].v++;tbl[ak].d++;}
    else if(m.hs<m.as){tbl[ak].pts+=3;tbl[ak].v++;tbl[hk].d++;}
    else{tbl[hk].pts++;tbl[ak].pts++;tbl[hk].e++;tbl[ak].e++;}
  });
  return Object.entries(tbl).map(([name,s])=>({name,...s}))
    .sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);
}

function renderGroups(){
  const v=document.getElementById('view-grupos');
  v.innerHTML=`
    <div class="readonly-note">👁 Somente leitura — insira resultados na aba Partidas</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>1º Lugar</div>
      <div class="legend-item"><div class="legend-dot" style="background:#86efac"></div>2º Lugar</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>3º (possível classificação)</div>
    </div>
    <div class="groups-grid" id="gg"></div>`;
  const gg=document.getElementById('gg');
  Object.keys(groupsBase).forEach(g=>{
    const st=calcStandings(g);
    const div=document.createElement('div');
    div.className='group-card';
    div.innerHTML=`<div class="group-header">⚽ Grupo ${g}</div>
      <table class="group-table">
        <thead><tr><th>Seleção</th><th>PJ</th><th>V</th><th>E</th><th>D</th><th>GF</th><th>GC</th><th>SG</th><th>PTS</th></tr></thead>
        <tbody>${st.map((t,i)=>{
          const cls=i===0?'qualify-1':i===1?'qualify-2':i===2?'qualify-3':'eliminate';
          return`<tr class="${cls}"><td><div class="team-cell">${t.name}${isRepSlot(t.name)?'<span class="rep-badge">REP</span>':''}</div></td>
            <td>${t.pj}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td>${t.gp}</td><td>${t.gc}</td>
            <td style="color:${t.sg>0?'var(--green)':t.sg<0?'var(--red)':'var(--muted)'}">${t.sg>0?'+':''}${t.sg}</td>
            <td class="pts-cell">${t.pts}</td></tr>`;
        }).join('')}</tbody>
      </table>`;
    gg.appendChild(div);
  });
}

      <div class="stat-card"><div class="stat-label">📈 Média / Partida</div><div class="stat-value">${played>0?(goals/played).toFixed(2):'—'}</div><div class="stat-sub">gols por jogo</div></div>
      <div class="stat-card"><div class="stat-label">🎮 Partidas Jogadas</div><div class="stat-value">${played}</div><div class="stat-sub">de ${total} na fase de grupos</div></div>
      <div class="stat-card"><div class="stat-label">🌍 Seleções</div><div class="stat-value">48</div><div class="stat-sub">12 grupos · 104 partidas</div></div>
    </div>
    <div class="section-title">🥅 Artilheiros</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <table class="scorers-table">
        <thead><tr><th>#</th><th>Jogador</th><th>Seleção</th><th>Gols</th></tr></thead>
        <tbody>${[...state.scorers].sort((a,b)=>b.goals-a.goals).map((s,i)=>`
          <tr>
            <td><span class="rank-badge ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</span></td>
            <td style="font-weight:600">${s.name}</td><td>${s.team}</td>
            <td><input class="goals-input" type="number" min="0" value="${s.goals}" onchange="updScorer('${s.name}',this.value)"></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
function updScorer(name,val){
  const s=state.scorers.find(x=>x.name===name);
  if(s){s.goals=parseInt(val)||0;saveState();toast('✓ Artilheiro atualizado!');}
}

// ══════════════════════════════════════════════════════
// NAV + TOAST
// ══════════════════════════════════════════════════════
function switchTab(btn,tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='partidas')   renderMatches();
  if(tab==='grupos')     renderGroups();
  if(tab==='repescagem') renderRepescagem();
  if(tab==='matamata')   renderKnockout();
  if(tab==='stats')      renderStats();
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// INIT — sync reps e renderizar
syncAllRepToGroups();
renderMatches();
</script>
</body>
</html>
